    server {
        # TLS
        listen 443 ssl;
        listen [::]:443 ssl;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

		location / {
			root /var/www/html;
			index index.html;
			try_files $uri $uri/ =404;
		}

